name = "moneywatch-rate-worker"
main = "rate-worker.js"
compatibility_date = "2025-01-01"

# 매일 새벽 6시 KST (= 전날 21:00 UTC)
[triggers]
crons = ["0 21 * * *"]

# ─────────────────────────────────────────────────────────────
# 환경변수는 이 파일에 넣지 않는다. (git에 올라가면 유출됨)
# 아래 두 종류를 Cloudflare 대시보드 또는 wrangler secret으로 등록:
#
# [Secret - 민감정보, 대시보드 Settings > Variables and Secrets 에서 "Secret"으로]
#   FSS_AUTH_KEY     금융감독원 오픈API 인증키
#   GH_TOKEN         GitHub Personal Access Token (repo 권한)
#   CF_DEPLOY_HOOK   Cloudflare Pages Deploy Hook URL
#
# [일반 변수 - 민감하지 않음, 아래 [vars]에 두거나 대시보드 "Text"로]
#   GH_REPO = "parkdane/pay-calc"
#   GH_PATH = "data/rates.json"
# ─────────────────────────────────────────────────────────────

[vars]
GH_REPO = "parkdane/pay-calc"
GH_PATH = "data/rates.json"
